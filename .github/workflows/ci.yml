name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pinned to a specific protocol commit so an unrelated change on
  # protocol main can't red rules CI overnight. Bump deliberately when
  # the protocol cuts a new tag (target: v0.2.0 — action contract,
  # rules_version 2). See AGENTS.md for bump cadence.
  #
  # NOTE: temporarily pinned to the v0.2.0-prep feature branch HEAD
  # while protocol PR #10 (action contract) is in review. Repoint to
  # the merged main commit once that PR lands.
  PROTOCOL_TAG: 5300bd78e4d98a9a9f8fc406cc916af9d23bd9a9
  FIXTURES_TAG: v1.0.0
  # Same coupling for the engine: `rules_version=2` is a hard-pin
  # against the EXP-1 engine branch until agent-readiness#64 merges,
  # otherwise reference-eval skips every rule with "rules_version=2
  # is not in supported set [1]".
  ENGINE_REF: feat/exp1-action-contract-engine

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pin to v6
        with:
          python-version: "3.12"
      - name: Install check-jsonschema
        run: pip install check-jsonschema
      - name: Fetch rule.schema.json
        run: |
          curl -fsSL -o rule.schema.json \
            "https://raw.githubusercontent.com/harrydaihaolin/agent-readiness-insights-protocol/${PROTOCOL_TAG}/schemas/rule.schema.json"
      - name: Validate every rule (make test)
        run: make test
      # Belt-and-braces: run the same hooks contributors are expected to
      # install via `pre-commit install`. If `pre-commit install` was
      # skipped locally, CI still surfaces what would have been caught.
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run all pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  reference-eval:
    runs-on: ubuntu-latest
    needs: validate-schema
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6
        with:
          path: rules-pack
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6
        with:
          repository: harrydaihaolin/agent-readiness-fixtures
          ref: ${{ env.FIXTURES_TAG }}
          path: fixtures
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6
        with:
          repository: harrydaihaolin/agent-readiness
          ref: ${{ env.ENGINE_REF }}
          path: agent-readiness
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pin to v6
        with:
          python-version: "3.12"
      - name: Install agent-readiness with insights-protocol
        # Pre-install protocol from the EXP-1 feature branch so the
        # editable engine install can satisfy `>=0.2` without the
        # 0.2.0 PyPI release being cut yet. Drop the first pip line
        # once protocol 0.2.0 is on PyPI.
        run: |
          pip install --upgrade pip
          pip install "agent-readiness-insights-protocol @ git+https://github.com/harrydaihaolin/agent-readiness-insights-protocol@${PROTOCOL_TAG}"
          pip install -e ./agent-readiness
      - name: Assert rules-eval is available (fail loud)
        run: |
          # The conditional "skip if missing" path was removed deliberately:
          # rules-eval has shipped in agent-readiness since 1.1.0 and is a
          # hard requirement of this CI. If a future agent-readiness release
          # ever drops the subcommand, we want CI to be red.
          agent-readiness --help 2>&1 | grep -q "rules-eval"
      - name: Evaluate rules against fixtures (snapshot diff)
        run: |
          set -euo pipefail
          mkdir -p rules-pack/tests/expected
          # Normalise absolute paths in the JSON output so the snapshot is
          # portable across runners. Keep this in sync with the script that
          # generates `tests/expected/*.json` locally.
          normalise() {
            python3 - "$1" "$2" <<'PY'
          import json, sys
          path, fixture_name = sys.argv[1], sys.argv[2]
          with open(path) as fh:
              data = json.load(fh)
          data['repo_path'] = f'fixtures/{fixture_name}'
          for check in data.get('checks', []):
              for f in (check.get('findings') or []):
                  if isinstance(f, dict) and isinstance(f.get('file'), str):
                      key = f'/fixtures/{fixture_name}/'
                      idx = f['file'].find(key)
                      if idx >= 0:
                          f['file'] = f['file'][idx + len(key):]
          with open(path, 'w') as fh:
              json.dump(data, fh, indent=2, sort_keys=True)
              fh.write('\n')
          PY
          }
          for fix in good noisy broken monorepo; do
            echo "=== fixture: $fix ==="
            actual="rules-pack/tests/expected/${fix}.actual.json"
            agent-readiness rules-eval "fixtures/fixtures/$fix" --rules rules-pack/rules --json > "$actual"
            normalise "$actual" "$fix"
            expected="rules-pack/tests/expected/${fix}.json"
            if [ ! -f "$expected" ]; then
              echo "::error::snapshot missing: $expected"
              echo "Generate it locally with the steps in AGENTS.md and commit."
              exit 1
            fi
            diff -u "$expected" "$actual" || { echo "::error::snapshot drift for $fix"; exit 1; }
          done

  self-scan:
    runs-on: ubuntu-latest
    needs: validate-schema
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pin to v6
        with:
          python-version: "3.12"
      # Pin to a major range so a PyPI release can't red CI overnight.
      - run: pip install 'agent-readiness>=1.1,<2'
      # YAML-only data repo: manifest/lockfile/typecheck checks aren't
      # applicable. 75 is the realistic ceiling.
      - run: agent-readiness scan . --fail-below 75
