rules_version: 2
id: templates.present
provenance: agent-readiness/templates.present
pillar: flow
title: Issue / PR templates and CODEOWNERS present
weight: 0.7
severity: info
explanation: |
  Issue templates, PR templates, and CODEOWNERS make agent-opened PRs
  routable: the right reviewer is auto-assigned, the right metadata
  fields are filled in, and the project's expectations are explicit.
  Repos without these get a flood of agent PRs that all look the same
  and have no obvious reviewer.
match:
  type: composite
  op: or
  summary: Issue templates, PR template, or CODEOWNERS configured.
  clauses:
    - type: path_glob
      require_globs:
        - .github/ISSUE_TEMPLATE/**
        - .gitlab/issue_templates/**
    - type: path_glob
      require_globs:
        - .github/PULL_REQUEST_TEMPLATE.md
        - .github/PULL_REQUEST_TEMPLATE/**
        - .github/pull_request_template.md
        - .gitlab/merge_request_templates/**
    - type: path_glob
      require_globs:
        - CODEOWNERS
        - .github/CODEOWNERS
        - docs/CODEOWNERS
fix_hint: |
  At minimum: drop `.github/ISSUE_TEMPLATE/bug_report.md` (GitHub has
  a wizard), a `.github/PULL_REQUEST_TEMPLATE.md` with a checklist,
  and a `CODEOWNERS` file mapping `*` to the team that should review
  agent-opened PRs.
fix_template:
  # The PR template is the highest-leverage of the three signals — it
  # changes the shape of every PR, including agent-opened ones — so we
  # patch it. Issue templates and CODEOWNERS still need separate PRs.
  kind: create_file
  path: .github/PULL_REQUEST_TEMPLATE.md
  content: |
    ## Summary

    <!-- One or two sentences: what changed and why. -->

    ## Test plan

    - [ ] Ran the canonical test command from `AGENTS.md`.
    - [ ] Manually verified the change end-to-end (describe how).

    ## Risk / rollback

    <!-- Any feature flags, migrations, or rollback steps reviewers should know. -->
insight_query: issue template PR template CODEOWNERS GitHub repository scaffolding
action:
  kind: create_file
  path: .github/PULL_REQUEST_TEMPLATE.md
  template: |
    ## Summary

    What does this change do, in 1-2 sentences?

    ## Test plan

    - [ ] Unit tests
    - [ ] Manual verification
  preconditions:
    - not_exists: .github/PULL_REQUEST_TEMPLATE.md
verify:
  command: "test -f .github/PULL_REQUEST_TEMPLATE.md"
  description: .github/PULL_REQUEST_TEMPLATE.md must exist.
