rules_version: 1
id: env.example_parity
pillar: flow
title: .env.example parity with .env reads
weight: 1.0
severity: warn
explanation: |
  When code reads from `.env` (or process environment) but no
  `.env.example` documents the expected keys, headless setup breaks:
  the agent can't tell which env vars to set before running tests or
  the app. The fix is documenting keys with empty values in an example
  file checked into the repo.
match:
  type: regex_in_files
  pattern: 'os\.environ|process\.env|\$\{?[A-Z][A-Z0-9_]+\}?'
  file_globs:
    - "src/**/*.py"
    - "src/**/*.js"
    - "src/**/*.ts"
    - "Makefile"
    - "**/*.sh"
  fire_when: match
fix_hint: |
  Add a `.env.example` file at the repo root listing each env var your
  code reads, with empty values or example placeholders. Document in
  README how to copy it.
insight_query: env example parity environment variables documentation
