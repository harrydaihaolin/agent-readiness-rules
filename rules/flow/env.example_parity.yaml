rules_version: 2
id: env.example_parity
provenance: agent-readiness/env.example_parity
pillar: flow
title: .env.example parity with code's env reads
weight: 1.0
severity: warn
explanation: |
  When code reads from `.env` (or process environment) but no
  `.env.example` documents the expected keys, headless setup
  breaks: the agent can't tell which env vars to set before running
  tests or the app. The full check is "code references env vars,
  AND no .env.example-style file exists, AND no equivalent prose
  documentation (``export FOO=`` snippets in README/CONTRIBUTING) is
  present." All three halves must hold to fire — repos that document
  env vars in narrative form get credit.
match:
  type: cross_file_consistency
  mode: env_parity
  env_patterns:
    - 'os\.environ'
    - 'os\.getenv'
    - 'process\.env\.'
    - 'process\.env\['
    - 'ENV\['
    - 'getenv\('
    - 'dotenv'
  source_globs:
    - "src/**/*.py"
    - "src/**/*.js"
    - "src/**/*.ts"
    - "src/**/*.rb"
    - "src/**/*.go"
    - "src/**/*.sh"
    - "Makefile"
  exclude_path_segments:
    - tests
    - test
    - scripts
    - docs
  require_one_of:
    - .env.example
    - .env.sample
    - .env.template
    - config/.env.example
    - deploy/.env.example
    - docker/.env.example
    - infra/.env.example
    - env/.env.example
    - envs/.env.example
  # If env vars are documented in prose (README/CONTRIBUTING) via
  # `export FOO=…` snippets or an explicit env-var section heading,
  # treat that as parity even without a .env.example file.
  doc_globs:
    - README.md
    - README.rst
    - README.txt
    - CONTRIBUTING.md
    - .github/CONTRIBUTING.md
    - docs/configuration.md
    - docs/setup.md
    - docs/getting-started.md
  doc_patterns:
    - 'export\s+[A-Z][A-Z0-9_]+\s*='
    - '##\s*Env(ironment)?(\s+vars)?'
    - '###\s*Env(ironment)?(\s+vars)?'
    - 'Required\s+env(ironment)?\s+vars?'
fix_hint: |
  Add a `.env.example` file at the repo root listing each env var
  your code reads, with empty values or example placeholders. Add
  a README sentence telling agents to `cp .env.example .env` before
  running.
insight_query: env example parity environment variables documentation .env.example
action:
  kind: create_file
  path: .env.example
  template: |
    # Required environment variables. Copy to .env and fill in values.
    # Discovered automatically from `os.environ.get(...)` / `process.env.*`
    # calls in the source tree.
    EXAMPLE_VAR=
  preconditions:
    - not_exists: .env.example
verify:
  command: "test -f .env.example"
  description: .env.example must exist.
