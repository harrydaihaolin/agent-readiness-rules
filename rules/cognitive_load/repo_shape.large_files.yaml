rules_version: 2
id: repo_shape.large_files
pillar: cognitive_load
title: Large source files
# Weight halved (1.0 → 0.5) after empirical analysis: this rule alone
# accounted for 56% of all WARN findings in the closed-loop scan over
# 141 repos. Until per-rule firing volume drops below 25%, keep it light
# so it does not dominate the overall pillar score.
#
# v1.5.0 (2026-05): IL3-V31-A. The v3.1 cohort scan put this rule at
# 88.1% fire (988/1110), which is high enough that the check has
# stopped discriminating — a check that fires on nine in ten repos is
# closer to a property of "large active codebase" than "this repo has
# a problematic large file." The rule's exclude_globs already cover
# the obvious non-source noise, so the remaining lever is threshold
# height.
#
# v2.0.1 (2026-05): EXP-2. The v1.5.0 bump (500 → 1500 lines / 50 KB →
# 150 KB) only moved the dial from ~88% to ~70% top-finding rate on
# the v3.2 (post-v1.5.0) cohort. Files in the 1500-3000 line band are
# uncomfortably common in real Python / TS codebases (frontend route
# manifests, Pydantic schemas, etc.) and aren't actually outliers — so
# bump again to 3000 lines / 300 KB to land the fire rate in the
# calibration target band of 30-60%. Phase 2 v3.3 dispatch is the
# production confirmation; if the band still isn't hit, the next lever
# is requiring BOTH thresholds (lines AND bytes) instead of either.
weight: 0.5
severity: warn
explanation: |
  Files over 3000 lines or 300 KB exceed an agent's working memory in
  a single read and force a chunked-reading pattern that loses
  context across chunk boundaries. This rule excludes lock files,
  generated data, binary assets, long-form tests, vendored
  third-party code, and build/template artefacts — which are large
  but not "source" files an agent would meaningfully edit. Thresholds
  recalibrated in v2.0.1 (3000 lines / 300 KB) from v1.5.0's 1500 /
  150 KB setting after EXP-2 fire-rate measurement on the v3.2 cohort;
  see the rule comment block for cohort calibration history.
match:
  type: file_size
  threshold_lines: 3000
  threshold_bytes: 307200
  exclude_globs:
    # Lock files of every flavour
    - "*.lock"
    - "*lock.json"
    - "Cargo.lock"
    - "uv.lock"
    - "poetry.lock"
    - "yarn.lock"
    - "pnpm-lock.yaml"
    - "Gemfile.lock"
    # Long-form metadata files projects accumulate over time
    - "CHANGELOG.md"
    - "MIGRATION.md"
    - "HISTORY.md"
    - "RELEASES.md"
    - "NEWS.md"
    # Build orchestration (often grows on cross-platform repos)
    - "Makefile"
    - "GNUmakefile"
    # Binary / media assets
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.svg"
    - "*.gif"
    - "*.webp"
    - "*.ico"
    - "*.pdf"
    - "*.zip"
    - "*.tar.gz"
    - "*.parquet"
    - "*.npz"
    - "*.h5"
    - "*.safetensors"
    # Notebooks (large but intentional)
    - "*.ipynb"
    # Test files in flat & nested layouts
    - "**/tests/**"
    - "**/test/**"
    - "**/__tests__/**"
    - "**/e2e/**"
    - "test_*.py"
    - "*_test.py"
    - "*.test.[jt]s"
    - "*.test.[jt]sx"
    - "*.spec.[jt]s"
    - "*.spec.[jt]sx"
    # Vendored / third-party sources we don't author
    - "**/vendor/**"
    - "**/third_party/**"
    - "**/external/**"
    # Build / dist / generated output
    - "**/dist/**"
    - "**/build/**"
    - "**/node_modules/**"
    - "**/__generated__/**"
    - "**/generated/**"
    # API spec / catalog manifests
    - "**/openapi/**"
    - "**/swagger/**"
    - "**/swagger/docs.go"
    - "**/gallery/**"
    - "**/index.yaml"
    - "**/index.yml"
    - "**/index.json"
    # Templates and *.template.* placeholders
    - "*.tmpl"
    - "*.template.*"
    # Autogenerated bindings / schema / fixture dumps. Adding these
    # finally takes us off the leaderboard's "fires on 92/96" plateau —
    # they're large by definition and not authored by humans.
    - "*pb2.py"
    - "*pb2_grpc.py"
    - "*_pb.py"
    - "*.pb.go"
    - "*.pb.cc"
    - "*.pb.h"
    - "*.generated.*"
    - "*.gen.go"
    - "*.gen.ts"
    - "*.codegen.*"
    - "schema.json"
    - "openapi.yaml"
    - "openapi.json"
    - "**/openapi.*"
    - "**/lsp/fixtures/**"
    - "**/snapshots/**"
    - "**/__snapshots__/**"
    - "**/*.snap"
fix_hint: |
  Split the file into smaller modules grouped by concept, or add an
  exclusion in `.agent-readiness.toml` if the file is truly intentional
  (large generated tables, etc.).
insight_query: large file false positive lock files generated assets
# Calibration band for v1.5.0 release: target fire rate 0.30–0.60 on
# the v3 cohort (ideas.md IL3-V31-A). Production confirmation lives
# in agent-readiness-leaderboard/data/releases/scores_v3_*.json from
# the v3.2 snapshot run.
action:
  kind: run_command
  command: |
    # Identify files exceeding the threshold; split each along its
    # dominant concept axis or move to a vendored / generated-output
    # exclude list.
    find . -type f \( -name '*.py' -o -name '*.ts' -o -name '*.tsx' \
      -o -name '*.js' -o -name '*.go' \) \
      -not -path './node_modules/*' -not -path './.venv/*' \
      | xargs wc -l 2>/dev/null \
      | awk '$1 > 3000 {print}'
  description: |
    No deterministic action — splitting a large source file is a human
    refactor decision. The command above lists candidates so the agent
    can propose a structured split.
verify:
  command: "true"
  description: Manual refactor; re-scan is the closed loop.
