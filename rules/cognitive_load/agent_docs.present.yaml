rules_version: 1
id: agent_docs.present
pillar: cognitive_load
title: Any agent-targeted docs present
# Downgraded warn → info (and weight 1.5 → 0.5) after empirical analysis:
# AGENTS.md is a 2024+ convention; firing warn on 78/141 mature repos
# overweighs an emerging norm. The stricter `agent_docs.canonical` rule
# below preserves the original warn semantics for the canonical filename.
weight: 0.5
severity: info
explanation: |
  Agents perform measurably better when the repo includes docs aimed at
  them (canonical commands, do-not-touch lists, branch conventions). A
  README is for humans; AGENTS.md / CLAUDE.md / .cursorrules /
  .cursor/rules/*.mdc / .github/copilot-instructions.md / .ai/ /
  prompts/ are common locations for agent-targeted material. This rule
  fires `info` when none of them are present.
match:
  type: path_glob
  require_globs:
    - AGENTS.md
    - CLAUDE.md
    - .cursorrules
    - .cursor/rules/*.mdc
    - .github/copilot-instructions.md
    - .ai/**
    - prompts/**
    - .windsurfrules
    - .clinerules
fix_hint: |
  Add an AGENTS.md to the root with at least: canonical commands
  (install/test/lint/run), do-not-touch list, and commit conventions.
  Alternatively, document agent-targeted material under .ai/ or
  .cursor/rules/. See agent-readiness/AGENTS.md for an example.
insight_query: AGENTS.md CLAUDE.md cursor rules adoption
