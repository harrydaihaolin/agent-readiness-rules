rules_version: 2
id: meta.consistency
provenance: agent-readiness/meta.consistency
pillar: cognitive_load
title: README claims match repo contents
weight: 0.5
severity: warn
explanation: |
  Drift between what README documents and what the repo actually has
  is one of the most expensive false starts for an agent: it follows
  the README, runs into a missing tool, and either reverts or
  invents a workaround. Common drifts caught here: README mentions
  pytest but no pytest config exists; README mentions `npm test`
  but no package.json; README references `make X` for a target that
  doesn't exist in the Makefile; README documents `npm run X` but
  the script is missing from package.json; README documents
  `pip install -e .` but no pyproject.toml/setup.py exists; AGENTS.md
  / CLAUDE.md is a placeholder.
match:
  type: cross_file_consistency
  mode: readme_repo_match
  checks:
    - pytest_mention_requires_config
    - npm_test_requires_package_json
    - agent_doc_not_placeholder
    - make_target_referenced_in_readme
    - package_json_script_referenced_in_readme
    - pip_editable_requires_manifest
fix_hint: |
  If your README says "run `pytest`", drop a `[tool.pytest.ini_options]`
  table in pyproject.toml so a fresh checkout actually runs tests
  with `pytest`. Same logic for any other tool you mention: every
  `make X`, `npm run X`, or `pip install -e .` line in the README must
  be backed by the corresponding target/script/manifest. Agent docs
  should be ≥ 100 bytes of real content, not a stub.
insight_query: README repo drift consistency placeholder pytest npm AGENTS.md make target npm run pip editable
action:
  kind: run_command
  command: |
    # Audit the README/AGENTS.md/CONTRIBUTING setup commands for
    # consistency. Any drift between them confuses agents.
    grep -E '(make install|pip install|npm install|setup)' \
      README.md AGENTS.md CONTRIBUTING.md 2>/dev/null
  description: |
    Reconcile setup / test commands across README.md, AGENTS.md, and
    CONTRIBUTING.md so all three documents reference the same flow.
verify:
  command: "true"
  description: Manual reconciliation; re-scan is the closed loop.
