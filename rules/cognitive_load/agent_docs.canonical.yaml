rules_version: 2
id: agent_docs.canonical
provenance: agent-readiness/agent_docs.canonical
pillar: cognitive_load
title: Canonical AGENTS.md present
weight: 1.0
severity: warn
explanation: |
  AGENTS.md at the repo root is the emerging canonical contract between
  human authors and coding agents (canonical commands, do-not-touch
  lists, commit conventions). Other formats (.cursorrules, CLAUDE.md,
  .ai/) help, but a single, well-named file at the root is the most
  predictable surface for any agent. This rule fires `warn` only when
  the canonical AGENTS.md is missing; partial coverage by sibling
  formats is rewarded by the softer `agent_docs.present` rule.
match:
  type: path_glob
  require_globs:
    - AGENTS.md
fix_hint: |
  Add an AGENTS.md to the repo root with: canonical commands
  (install/test/lint/run), a do-not-touch list, and commit conventions.
  See agent-readiness/AGENTS.md for an example.
fix_template:
  kind: create_file
  path: AGENTS.md
  content: |
    # Agent guide

    Conventions for AI coding agents working in this repository.

    ## Canonical commands

    - Install dev deps: `<replace with your install command>`
    - Run tests:        `<replace with your test command>`
    - Lint:             `<replace with your lint command>`

    ## Do-not-touch

    - Generated/vendored directories (list them).
    - Lockfiles unless the change is intentional.

    ## Style

    - Keep diffs scoped to one logical change.
    - Don't skip pre-commit hooks (`--no-verify`); fix the underlying issue.

    ## Headless contract

    The canonical commands above must run non-interactively — no TTY,
    no prompts. If a step needs human input, gate it behind a flag.

    ## CI and the feedback loop

    **CI is part of the feedback loop.** After you push or update a PR, **monitor GitHub Actions / workflow runs and check results**. When **CI fails**, read the logs, **fix the root cause**, and push follow-up commits. Do not stop while checks are red or ignore failing workflows.
insight_query: AGENTS.md canonical contract agent docs convention
action:
  kind: create_file
  path: AGENTS.md
  template: |
    # Agents guide

    A concise (<2 KB) orientation document for autonomous coding agents
    working in this repository. Document, in order:

    1. What this repo does in one sentence.
    2. The single command an agent runs to set up the environment.
    3. The single command to run tests.
    4. The single command to lint.
    5. Where the entry point lives (file path + function/binary name).

    Keep it < 60 lines so it fits in any agent's context window.
  preconditions:
    - not_exists: AGENTS.md
  context_probe:
    - detect: primary_language
verify:
  command: "test -f AGENTS.md"
  description: AGENTS.md must exist at the repo root.
