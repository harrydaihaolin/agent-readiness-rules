rules_version: 2
id: security.policy_present
pillar: safety
title: Security policy (SECURITY.md) present
weight: 0.6
severity: info
explanation: |
  A SECURITY.md (or .github/SECURITY.md / docs/SECURITY.md) tells
  agents and reporters where to send vulnerability disclosures and what
  the project's response window is. Without it, a coding agent that
  finds a security issue has no documented escalation path and may
  default to opening a public issue.
match:
  type: path_glob
  require_globs:
    - SECURITY.md
    - .github/SECURITY.md
    - docs/SECURITY.md
fix_hint: |
  Add a SECURITY.md at the repo root with at least: how to report a
  vulnerability (private channel), supported versions, and expected
  response time. GitHub's "Add a security policy" template is fine.
fix_template:
  kind: create_file
  path: SECURITY.md
  content: |
    # Security policy

    ## Reporting a vulnerability

    Please **do not open a public issue** for security problems. Email
    the maintainers at `<security@example.com>` (replace with the right
    address) or use GitHub's private vulnerability reporting if enabled.
    Include reproduction steps and any logs you can share.

    ## Supported versions

    | Version | Supported |
    | ------- | --------- |
    | latest  | ✅        |
    | older   | best effort |

    ## Response window

    We aim to acknowledge reports within 2 business days and to ship a
    fix or mitigation within 30 days for high-severity issues.
insight_query: SECURITY.md security policy disclosure vulnerability reporting
action:
  kind: create_file
  path: SECURITY.md
  template: |
    # Security policy

    ## Reporting a vulnerability

    Email security@example.com or open a GitHub Security Advisory.
    We respond within 48 hours and aim to ship a fix within 14 days.
  preconditions:
    - not_exists: SECURITY.md
verify:
  command: "test -f SECURITY.md"
  description: SECURITY.md must exist at the repo root.
