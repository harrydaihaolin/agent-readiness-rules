rules_version: 1
id: secrets.basic_scan
pillar: safety
title: No high-confidence secrets in tracked files
weight: 1.0
severity: error
explanation: |
  Tracked files containing AWS access keys, GitHub tokens, Slack
  tokens, Google API keys, Stripe live keys, or PEM private keys
  are almost always a credential leak. Even rotating after the fact
  doesn't help — the leaked secret is in git history forever. This
  rule catches the high-confidence patterns; for full coverage,
  layer a tool like `gitleaks` (see safety.gitleaks_config) on top.
match:
  type: regex_secret_scan
  patterns:
    - name: aws_access_key_id
      regex: "\\bAKIA[0-9A-Z]{16}\\b"
    - name: aws_secret_access_key
      regex: "(?i)aws_secret_access_key\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=]{40}[\"']?"
    - name: github_token
      regex: "\\b(ghp_|gho_|ghu_|ghs_|ghr_)[A-Za-z0-9]{36}\\b"
    - name: github_pat
      regex: "\\bgithub_pat_[A-Za-z0-9_]{82}\\b"
    - name: slack_token
      regex: "\\bxox[abprs]-[A-Za-z0-9-]{10,}\\b"
    - name: google_api_key
      regex: "\\bAIza[0-9A-Za-z_-]{35}\\b"
    - name: stripe_live_key
      regex: "\\bsk_live_[0-9a-zA-Z]{24,}\\b"
    - name: pem_private_key
      regex: "-----BEGIN (RSA |EC |OPENSSH |PGP |DSA )?PRIVATE KEY-----"
  exclude_path_segments:
    - example
    - examples
    - fixture
    - fixtures
    - mock
    - mocks
    - sample
    - samples
    - docs
    - test
    - tests
  max_bytes_per_file: 65536
  max_findings: 50
fix_hint: |
  ROTATE the leaked credential immediately (don't just delete it
  from the file — assume it's compromised the moment it touched
  git). Then remove it from history (`git filter-repo`) and
  configure a secrets scanner (`gitleaks`, GitHub secret scanning)
  to prevent recurrence.
insight_query: secret scan AWS GitHub Slack Stripe PEM key leak credentials
