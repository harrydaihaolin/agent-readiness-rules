rules_version: 2
id: gitignore.covers_junk
pillar: safety
title: .gitignore covers build artifacts and secrets
weight: 1.0
severity: warn
explanation: |
  An agent that runs `pip install` / `npm install` / a build will
  produce artefact directories (`__pycache__`, `node_modules`,
  `dist/`, `build/`, IDE settings, coverage reports). If the
  `.gitignore` doesn't cover them, those artefacts get accidentally
  committed and pollute future diffs. The same pattern catches
  secrets — `.env` not being ignored is how API keys end up in
  public history.
match:
  type: gitignore_coverage
  min_groups_covered: 7
  groups:
    - python_pycache
    - node_modules
    - dotenv
    - dist_build
    - go_vendor
    - rust_target
    - jvm_class
    - ide_junk
    - python_egg_info
    - coverage
    - terraform
    - logs
fix_hint: |
  Run `gitignore.io` for your stack and paste the result into
  `.gitignore`. At minimum, cover: `__pycache__`, `node_modules`,
  `.env`, `dist/`, `build/`, `*.log`, IDE settings, coverage dirs.
fix_template:
  # ``append_to_file`` so the patch works whether the repo already has a
  # `.gitignore` (we add the missing groups) or has none (it gets
  # created). The appended block is intentionally generic — covers the
  # 7+ groups this rule scores on without language-specific assumptions.
  kind: append_to_file
  path: .gitignore
  content: |
    # --- agent-readiness: cover common build artefacts and secrets ---
    # Python
    __pycache__/
    *.py[cod]
    *.egg-info/
    .venv/
    venv/

    # JS / Node
    node_modules/

    # Build / dist
    dist/
    build/
    target/

    # IDE / OS junk
    .idea/
    .vscode/
    .DS_Store

    # Coverage / logs / env
    coverage/
    htmlcov/
    *.log
    .env
    .env.*
insight_query: .gitignore build artifacts secrets node_modules pycache .env coverage
action:
  kind: edit_gitignore
  entries:
    - .env
    - .env.*
    - "!.env.example"
    - .venv/
    - venv/
    - node_modules/
    - dist/
    - build/
    - "*.log"
    - .DS_Store
    - "*.pyc"
    - __pycache__/
verify:
  command: |
    grep -E '^(\.env|node_modules|\.venv|dist|__pycache__)' .gitignore >/dev/null
  description: .gitignore must cover the standard junk groups.
