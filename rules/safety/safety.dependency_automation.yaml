rules_version: 1
id: safety.dependency_automation
pillar: safety
title: Automated dependency / vulnerability scanning configured
weight: 1.0
severity: warn
explanation: |
  Stale dependencies and unscanned third-party code are the most
  common path from "agent merged a small change" to "merged a CVE".
  A repo that declares Dependabot, Renovate, Snyk, FOSSA, Mend, or
  CodeQL gets PRs / alerts for vulnerable transitive deps and unsafe
  patterns automatically, so agents reviewing those PRs can act on
  them rather than re-discovering the issue from scratch.
match:
  type: composite
  op: or
  summary: At least one automated dependency / vuln scanner is configured.
  clauses:
    - type: path_glob
      require_globs:
        - .github/dependabot.yml
        - .github/dependabot.yaml
        - .renovaterc
        - .renovaterc.json
        - .renovaterc.json5
        - renovate.json
        - renovate.json5
        - .github/renovate.json
        - .github/renovate.json5
    - type: path_glob
      require_globs:
        - .snyk
        - .fossa.yml
        - .whitesource
        - .mend/**
    - type: regex_in_files
      pattern: '(?i)\b(codeql|code-scanning)\b'
      file_globs:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
fix_hint: |
  Drop a minimal `.github/dependabot.yml` (or `renovate.json`) at
  the repo root that updates `pip` / `npm` / `github-actions`
  weekly. Add a CodeQL workflow if your language is supported. See
  https://docs.github.com/en/code-security/dependabot for examples.
fix_template:
  kind: create_file
  path: .github/dependabot.yml
  content: |
    # Updates GitHub Actions and the most common ecosystems weekly.
    # Add or remove `package-ecosystem` blocks to match your stack.
    version: 2
    updates:
      - package-ecosystem: "github-actions"
        directory: "/"
        schedule:
          interval: "weekly"
      - package-ecosystem: "pip"
        directory: "/"
        schedule:
          interval: "weekly"
      - package-ecosystem: "npm"
        directory: "/"
        schedule:
          interval: "weekly"
insight_query: dependabot renovate snyk fossa codeql dependency vuln scan automated
